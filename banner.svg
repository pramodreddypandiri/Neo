<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb950;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#56d364;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- LEFT SIDE: Without Neo -->
  <!-- Panel background -->
  <rect x="40" y="80" width="480" height="440" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5" opacity="0.9"/>

  <!-- Panel header -->
  <rect x="40" y="80" width="480" height="44" rx="12" fill="#21262d"/>
  <rect x="40" y="104" width="480" height="20" fill="#21262d"/>
  <!-- traffic lights -->
  <circle cx="68" cy="102" r="7" fill="#ff5f57"/>
  <circle cx="90" cy="102" r="7" fill="#febc2e"/>
  <circle cx="112" cy="102" r="7" fill="#28c840"/>
  <text x="260" y="107" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#8b949e" text-anchor="middle">without neo.md</text>

  <!-- Grep chaos illustration -->
  <!-- Central node: Claude -->
  <circle cx="280" cy="220" r="32" fill="#161b22" stroke="#58a6ff" stroke-width="2" filter="url(#glow)"/>
  <text x="280" y="215" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#58a6ff" text-anchor="middle">Claude</text>
  <text x="280" y="230" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#58a6ff" text-anchor="middle">Code</text>

  <!-- File nodes scattered -->
  <rect x="90" y="145" width="90" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="135" y="164" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#8b949e" text-anchor="middle">auth.ts</text>

  <rect x="390" y="145" width="90" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="435" y="164" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#8b949e" text-anchor="middle">user.ts</text>

  <rect x="80" y="290" width="90" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="125" y="309" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#8b949e" text-anchor="middle">jwt.ts</text>

  <rect x="395" y="290" width="90" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="440" y="309" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#8b949e" text-anchor="middle">config.ts</text>

  <rect x="175" y="355" width="100" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="225" y="374" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#8b949e" text-anchor="middle">session.ts</text>

  <rect x="320" y="355" width="110" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="375" y="374" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#8b949e" text-anchor="middle">middleware.ts</text>

  <!-- Grep arrows — dashed red to show scattershot -->
  <line x1="248" y1="196" x2="175" y2="170" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>
  <line x1="312" y1="196" x2="392" y2="170" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>
  <line x1="252" y1="240" x2="160" y2="292" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>
  <line x1="308" y1="240" x2="398" y2="292" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>
  <line x1="265" y1="250" x2="245" y2="357" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>
  <line x1="295" y1="250" x2="355" y2="357" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>

  <!-- grep labels -->
  <text x="198" y="178" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#ff4444" opacity="0.9">grep</text>
  <text x="338" y="178" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#ff4444" opacity="0.9">grep</text>
  <text x="190" y="268" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#ff4444" opacity="0.9">grep</text>
  <text x="355" y="268" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#ff4444" opacity="0.9">grep</text>

  <!-- Token cost badge -->
  <rect x="160" y="410" width="240" height="80" rx="8" fill="#21262d" stroke="#ff4444" stroke-width="1.5"/>
  <text x="280" y="435" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e" text-anchor="middle">total tokens</text>
  <text x="280" y="468" font-family="'SF Mono', 'Fira Code', monospace" font-size="26" fill="#ff4444" text-anchor="middle" font-weight="bold" filter="url(#glow)">85,125</text>

  <!-- RIGHT SIDE: With Neo -->
  <rect x="680" y="80" width="480" height="440" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5" opacity="0.9"/>
  <rect x="680" y="80" width="480" height="44" rx="12" fill="#21262d"/>
  <rect x="680" y="104" width="480" height="20" fill="#21262d"/>
  <circle cx="708" cy="102" r="7" fill="#ff5f57"/>
  <circle cx="730" cy="102" r="7" fill="#febc2e"/>
  <circle cx="752" cy="102" r="7" fill="#28c840"/>
  <text x="920" y="107" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#8b949e" text-anchor="middle">with neo.md (vision)</text>

  <!-- neo.md central node -->
  <rect x="848" y="155" width="144" height="100" rx="8" fill="#0d1117" stroke="#3fb950" stroke-width="2" filter="url(#glow)"/>
  <text x="920" y="178" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#3fb950" text-anchor="middle">neo.md</text>
  <text x="920" y="198" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#56d364" text-anchor="middle">auth.ts → jwt.ts</text>
  <text x="920" y="214" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#56d364" text-anchor="middle">user.ts → db.ts</text>
  <text x="920" y="230" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#56d364" text-anchor="middle">config.ts</text>
  <text x="920" y="246" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#4b5563" text-anchor="middle">47 files mapped</text>

  <!-- Claude node on right -->
  <circle cx="920" cy="340" r="32" fill="#161b22" stroke="#58a6ff" stroke-width="2" filter="url(#glow)"/>
  <text x="920" y="335" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#58a6ff" text-anchor="middle">Claude</text>
  <text x="920" y="350" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#58a6ff" text-anchor="middle">Code</text>

  <!-- Single clean arrow from neo.md to Claude -->
  <line x1="920" y1="255" x2="920" y2="308" stroke="#3fb950" stroke-width="2" filter="url(#glow)"/>
  <polygon points="920,308 914,296 926,296" fill="#3fb950"/>
  <text x="938" y="285" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#3fb950">1 read</text>

  <!-- Direct arrows from Claude to just the right files -->
  <rect x="730" y="390" width="90" height="28" rx="4" fill="#21262d" stroke="#3fb950" stroke-width="1" opacity="0.8"/>
  <text x="775" y="409" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#56d364" text-anchor="middle">auth.ts</text>

  <rect x="1000" y="390" width="90" height="28" rx="4" fill="#21262d" stroke="#3fb950" stroke-width="1" opacity="0.8"/>
  <text x="1045" y="409" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#56d364" text-anchor="middle">jwt.ts</text>

  <line x1="895" y1="365" x2="810" y2="392" stroke="#3fb950" stroke-width="1.5" opacity="0.7"/>
  <line x1="945" y1="365" x2="1020" y2="392" stroke="#3fb950" stroke-width="1.5" opacity="0.7"/>

  <!-- Token cost badge right -->
  <rect x="800" y="430" width="240" height="70" rx="8" fill="#21262d" stroke="#3fb950" stroke-width="1.5" opacity="0.6"/>
  <text x="920" y="453" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e" text-anchor="middle">total tokens (theory)</text>
  <text x="920" y="483" font-family="'SF Mono', 'Fira Code', monospace" font-size="26" fill="#3fb950" text-anchor="middle" font-weight="bold" opacity="0.6">~60,000</text>

  <!-- CENTER DIVIDER -->
  <line x1="600" y1="100" x2="600" y2="530" stroke="#30363d" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="600" y="320" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#30363d" text-anchor="middle" transform="rotate(-90, 600, 320)">vs</text>

  <!-- TITLE AREA TOP -->
  <text x="600" y="44" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" fill="#f0f6fc" text-anchor="middle" font-weight="700" letter-spacing="-0.5">I Built a Tool to Save AI Coding Tokens.</text>
  <text x="600" y="72" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" fill="#ff4444" text-anchor="middle" font-weight="700" letter-spacing="-0.5" filter="url(#glow)">It Used More.</text>

  <!-- BOTTOM BAR -->
  <rect x="0" y="555" width="1200" height="75" fill="#161b22" opacity="0.95"/>
  <line x1="0" y1="555" x2="1200" y2="555" stroke="#30363d" stroke-width="1"/>

  <!-- Reality badge -->
  <rect x="440" y="572" width="320" height="38" rx="6" fill="#21262d" stroke="#ff4444" stroke-width="1"/>
  <text x="600" y="597" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#ff4444" text-anchor="middle">reality: neo.md made it 25% worse</text>

  <!-- Tag left -->
  <text x="60" y="598" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#58a6ff">#claudecode</text>
  <text x="60" y="616" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#58a6ff">#rust</text>

  <!-- Tag right -->
  <text x="1140" y="598" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e" text-anchor="end">#aiengineering</text>
  <text x="1140" y="616" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e" text-anchor="end">#buildinpublic</text>
</svg>
